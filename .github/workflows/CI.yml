name: Build for Raspberry Pi (ARM64)

on:
  push:
    branches: [ "master", "main" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "master", "main" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-arm64:
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v4

    # 1. 安装系统依赖 (Ubuntu 24.04 ARM64 原生环境)
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libssl-dev \
          pkg-config \
          python3-dev \
          python3-pip \
          build-essential \
          curl

    # 2. 配置 Rust 环境 (原生 ARM64，不需要交叉编译)
    - name: Setup Rust
      uses: dtolnay/rust-action@stable
      with:
        toolchain: stable

    # 3. 配置 Cargo 使用 Git CLI
    - name: Configure Cargo for Git
      run: |
        mkdir -p ~/.cargo
        cat >> ~/.cargo/config.toml << 'EOF'
        [net]
        git-fetch-with-cli = true
        EOF
        cat ~/.cargo/config.toml

    # 4. 安装 Python 工具
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Maturin
      run: |
        pip3 install --upgrade maturin

    # 5. 增加 Swap 空间 (防止内存不足)
    - name: Increase Swap Space
      run: |
        sudo fallocate -l 3G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        echo "=== Memory and Swap Info ==="
        free -h

    # 6. 执行构建
    - name: Build Wheel
      run: |
        maturin build --release --strip --interpreter python3

    # 7. 上传构建产物
    - name: Upload Wheel
      uses: actions/upload-artifact@v4
      with:
        name: bili-ticket-gt-wheels-arm64
        path: target/wheels/*.whl
        retention-days: 30
