name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # 指定构建目标为 aarch64 (ARM 64位)
  TARGET_ARCH: aarch64

jobs:
  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
            RUSTFLAGS: "-Ctarget-feature=+crt-static"
        with:
          args: --release --out dist --find-interpreter
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist

  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  macos-arm64:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-latest
            target: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: --release --out dist --find-interpreter
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  macos-x64:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: macos-13
            target: x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    needs: [windows, linux, macos-x64, macos-arm64, sdist]
    steps:
      - uses: actions/download-artifact@v4
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing wheels-*/*
  build-arm64:
    runs-on: ubuntu-24.04 # 使用与你系统一致的 Ubuntu 24.04
    # 确保 runner 支持 ARM，或者使用模拟（这里假设使用支持 ARM 的 runner 或交叉编译）
    # 如果是 GitHub Hosted Runner (通常是 x86)，我们需要进行交叉编译或安装 QEMU
    # 但为了模拟你的真实环境，这里演示如何在原生或模拟的 ARM 环境下构建
    
    steps:
    - uses: actions/checkout@v4

    # 1. 安装依赖 (针对 Ubuntu 24.04)
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        # 安装 OpenSSL 开发库 (解决 openssl-sys 报错)
        sudo apt-get install -y libssl-dev pkg-config
        # 安装 Python 开发头文件 (解决 Python.h 报错)
        sudo apt-get install -y python3-dev python3-pip
        # 安装构建工具
        sudo apt-get install -y build-essential

    # 2. 配置 Rust 环境
    - name: Setup Rust
      uses: dtolnay/rust-action@stable
      with:
        toolchain: stable
        target: aarch64-unknown-linux-gnu

    # 3. 关键：配置 Cargo 使用 Git CLI (解决 SSL error)
    - name: Configure Cargo for Git
      run: |
        mkdir -p ~/.cargo
        echo "[net]" >> ~/.cargo/config.toml
        echo "git-fetch-with-cli = true" >> ~/.cargo/config.toml
        cat ~/.cargo/config.toml

    # 4. 安装 Python 工具
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 推荐使用 3.10

    - name: Install Maturin
      run: |
        pip3 install maturin

    # 5. 构建设置：增加 Swap 防止树莓派内存不足
    # 树莓派 4GB 内存编译 Rust 容易 OOM，建议增加 2GB Swap
    - name: Increase Swap Space (RPi Optimization)
      run: |
        sudo fallocate -l 2G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h

    # 6. 执行构建
    - name: Build Wheel
      run: |
        # 使用 maturin build
        # --release 开启优化
        # --strip 去除符号表减小体积
        maturin build --release --strip --interpreter python3

    # 7. 上传构建产物
    - name: Upload Wheel
      uses: actions/upload-artifact@v4
      with:
        name: bili-ticket-gt-python-arm64
        path: target/wheels/*.whl
