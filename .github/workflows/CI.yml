name: Build for Raspberry Pi (ARM64) (via QEMU on GitHub-hosted runners)

on:
  push:
    branches: [ "master", "main" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "master", "main" ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-arm64-via-qemu:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup QEMU (enable multiarch emulation)
      uses: docker/setup-qemu-action@v2

    - name: Setup Docker Buildx (required for --platform emulation)
      uses: docker/setup-buildx-action@v2

    - name: Build inside an emulated aarch64 container and produce wheel
      run: |
        set -euo pipefail
        # run an emulated aarch64 Ubuntu container and do a native aarch64 build there
        docker run --rm --platform=linux/arm64 \
          -v "${GITHUB_WORKSPACE}":/work -w /work \
          ubuntu:24.04 /bin/bash -lc "
            set -euo pipefail
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y --no-install-recommends \
              build-essential \
              libssl-dev \
              pkg-config \
              python3-dev \
              python3-pip \
              ca-certificates \
              curl
            # install rust
            curl https://sh.rustup.rs -sSf | sh -s -- -y
            export PATH=/root/.cargo/bin:\$PATH
            rustup toolchain install stable
            rustup default stable
            # python tooling
            pip3 install --upgrade pip maturin
            # sanity
            python3 --version
            rustc --version
            # build wheel (writes to /work/target/wheels because host dir is mounted)
            maturin build --release --strip --interpreter python3
          "

    - name: List produced wheels
      run: ls -lah target/wheels || true

    - name: Upload Wheel artifact
      uses: actions/upload-artifact@v4
      with:
        name: bili-ticket-gt-wheels-arm64
        path: target/wheels/*.whl
        retention-days: 30
